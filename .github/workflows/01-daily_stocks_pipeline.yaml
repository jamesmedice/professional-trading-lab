name: 01 MAIN HOTSTOCK PIPELINE

on:
  push:
    branches:
      - master
  schedule:
    - cron: "*/20 13-20 * * 1-5"
  workflow_dispatch:
    
permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install jupyter ipykernel papermill firebase-admin

      - name: Install kernel
        run: python -m ipykernel install --user --name python3

      # --------------------------------------------------
      # 🔥 CRITICAL FIX — Create all folders notebooks use
      # --------------------------------------------------
      - name: Create required folders
        run: |
          mkdir -p data        
          mkdir -p data/daily
          mkdir -p output
          mkdir -p output/top
          
      # --------------------------------------------------
      # (1) RUN NOTEBOOK 01
      # --------------------------------------------------
      - name: Run 01 - Daily Yahoo Scanner
        run: |
          papermill "01-daily_stocks.ipynb" \
            "output/01-daily_stocks$(date +'%Y%m%d_%H%M').ipynb"

      # --------------------------------------------------
      # Upload to Firebase
      # --------------------------------------------------
      - name: Upload Firebase Data
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: python scripts/upload_01.py

      # --------------------------------------------------
      # Artifacts (optional)
      # --------------------------------------------------
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: full-pipeline-runs
          path: output/

                # --------------------------------------------------
      # COMMIT OUTPUTS BACK TO GITHUB
      # --------------------------------------------------
      - name: Commit updated output & data folders
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "jamesmedice"
          git config user.email "tiago.sllater@github.com"

          # Add anything produced by the notebooks
          git add data/ || true
          git commit -m "Update pipeline output [skip ci]" || true
          
          git pull --rebase || true
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }} HEAD:${{ github.ref }} || true
